<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puneeth Bird Hunt</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f7fb;
      color: #1f2937;
    }

    .page {
      max-width: 900px;
      margin: 30px auto;
      padding: 24px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      color: #0f172a;
    }

    .status {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px;
      margin-bottom: 20px;
    }

    .status p {
      margin: 0;
      padding: 10px 12px;
      border-left: 4px solid #2563eb;
      background: #eff6ff;
      border-radius: 6px;
    }

    .status .help-trigger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      max-width: 240px;
      border-radius: 999px;
      background: linear-gradient(120deg, #0f172a, #1e293b, #0f172a);
      color: #f8fafc;
      border: 1px solid #0b1120;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      border-left: none;
      margin-right: auto;
    }

    .status .help-trigger:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.2);
      filter: brightness(1.05);
    }

    .status .help-output {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      background: linear-gradient(120deg, #fff7ed, #ffedd5, #fed7aa);
      border: 1px solid #f97316;
      font-weight: 700;
      color: #9a3412;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      border-left: none;
    }

    .help-output::before {
      content: "Hint";
      font-size: 0.75rem;
      font-weight: 800;
      color: #92400e;
      letter-spacing: 0.12em;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(249, 115, 22, 0.12);
    }

    .board {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }

    .location {
      aspect-ratio: 1 / 1;
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      overflow: hidden;
      background: #e2e8f0;
    }

    .location img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @media (max-width: 800px) {
      .row {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Puneeth Reddy Gaddam bird hunt</h1>

    <p>Click on the locations to find the birds, watch out for the forbidden statue</p>

    <div class="status">
      <p id="locations">Number of locations checked is zero.</p>
      <p id="score">Score is zero.</p>
      <p id="helpTrigger" class="help-trigger" onclick="help()">Click for help</p>
      <p id="help" class="help-output">Help report</p>
    </div>

    <div class="board">
      <div class="row">
        <div class="location"><img id="location0" src="images/Tree.png" alt="bush or tree" onclick="check(0)"></div>
        <div class="location"><img id="location1" src="images/Tree.png" alt="bush or tree" onclick="check(1)"></div>
        <div class="location"><img id="location2" src="images/Tree.png" alt="bush or tree" onclick="check(2)"></div>
        <div class="location"><img id="location3" src="images/Tree.png" alt="bush or tree" onclick="check(3)"></div>
        <div class="location"><img id="location4" src="images/Tree.png" alt="bush or tree" onclick="check(4)"></div>
        <div class="location"><img id="location5" src="images/Tree.png" alt="bush or tree" onclick="check(5)"></div>
        <div class="location"><img id="location6" src="images/Tree.png" alt="bush or tree" onclick="check(6)"></div>
      </div>

      <div class="row">
        <div class="location"><img id="location7" src="images/Tree.png" alt="bush or tree" onclick="check(7)"></div>
        <div class="location"><img id="location8" src="images/Tree.png" alt="bush or tree" onclick="check(8)"></div>
        <div class="location"><img id="location9" src="images/Tree.png" alt="bush or tree" onclick="check(9)"></div>
        <div class="location"><img id="location10" src="images/Tree.png" alt="bush or tree" onclick="check(10)"></div>
        <div class="location"><img id="location11" src="images/Tree.png" alt="bush or tree" onclick="check(11)"></div>
        <div class="location"><img id="location12" src="images/Tree.png" alt="bush or tree" onclick="check(12)"></div>
        <div class="location"><img id="location13" src="images/Tree.png" alt="bush or tree" onclick="check(13)"></div>
      </div>

      <div class="row">
        <div class="location"><img id="location14" src="images/Tree.png" alt="bush or tree" onclick="check(14)"></div>
        <div class="location"><img id="location15" src="images/Tree.png" alt="bush or tree" onclick="check(15)"></div>
        <div class="location"><img id="location16" src="images/Tree.png" alt="bush or tree" onclick="check(16)"></div>
        <div class="location"><img id="location17" src="images/Tree.png" alt="bush or tree" onclick="check(17)"></div>
        <div class="location"><img id="location18" src="images/Tree.png" alt="bush or tree" onclick="check(18)"></div>
        <div class="location"><img id="location19" src="images/Tree.png" alt="bush or tree" onclick="check(19)"></div>
        <div class="location"><img id="location20" src="images/Tree.png" alt="bush or tree" onclick="check(20)"></div>
      </div>

      <div class="row">
        <div class="location"><img id="location21" src="images/Tree.png" alt="bush or tree" onclick="check(21)"></div>
        <div class="location"><img id="location22" src="images/Tree.png" alt="bush or tree" onclick="check(22)"></div>
        <div class="location"><img id="location23" src="images/Tree.png" alt="bush or tree" onclick="check(23)"></div>
        <div class="location"><img id="location24" src="images/Tree.png" alt="bush or tree" onclick="check(24)"></div>
        <div class="location"><img id="location25" src="images/Tree.png" alt="bush or tree" onclick="check(25)"></div>
        <div class="location"><img id="location26" src="images/Tree.png" alt="bush or tree" onclick="check(26)"></div>
        <div class="location"><img id="location27" src="images/Tree.png" alt="bush or tree" onclick="check(27)"></div>
      </div>

      <div class="row">
        <div class="location"><img id="location28" src="images/Tree.png" alt="bush or tree" onclick="check(28)"></div>
        <div class="location"><img id="location29" src="images/Tree.png" alt="bush or tree" onclick="check(29)"></div>
        <div class="location"><img id="location30" src="images/Tree.png" alt="bush or tree" onclick="check(30)"></div>
        <div class="location"><img id="location31" src="images/Tree.png" alt="bush or tree" onclick="check(31)"></div>
        <div class="location"><img id="location32" src="images/Tree.png" alt="bush or tree" onclick="check(32)"></div>
        <div class="location"><img id="location33" src="images/Tree.png" alt="bush or tree" onclick="check(33)"></div>
        <div class="location"><img id="location34" src="images/Tree.png" alt="bush or tree" onclick="check(34)"></div>
      </div>
    </div>
  </main>
  <script>
    const ids = [
      "location0", "location1", "location2", "location3", "location4", "location5", "location6",
      "location7", "location8", "location9", "location10", "location11", "location12", "location13",
      "location14", "location15", "location16", "location17", "location18", "location19", "location20",
      "location21", "location22", "location23", "location24", "location25", "location26", "location27",
      "location28", "location29", "location30", "location31", "location32", "location33", "location34"
    ];
    let score = 0;
    let locationsVisited = 0;
    let lastLocation = 0;
    let statueLocation = 19;
    let toucanLocation = 14;
    let lorikeetLocations = [3, 25];
    let buntingLocations = [2, 5, 11, 20, 21];
    let gameOver = false;
    const totalLocations = 35;
    const columns = 7;
    const rows = 5;

    function randomInt(max) {
      return Math.floor(Math.random() * max);
    }

    function shuffleArray(values) {
      for (let i = values.length - 1; i > 0; i -= 1) {
        const j = randomInt(i + 1);
        const temp = values[i];
        values[i] = values[j];
        values[j] = temp;
      }
    }

    function initializeLocations() {
      const positions = [];
      for (let i = 0; i < totalLocations; i += 1) {
        positions.push(i);
      }
      shuffleArray(positions);
      statueLocation = positions[0];
      toucanLocation = positions[1];
      lorikeetLocations = [positions[2], positions[3]];
      buntingLocations = [positions[4], positions[5], positions[6], positions[7], positions[8]];
    }

    function moveToucan(playerPosition) {
      const currentRow = Math.floor(toucanLocation / columns);
      const currentCol = toucanLocation % columns;
      const directions = [
        { row: -1, col: 0 },
        { row: 1, col: 0 },
        { row: 0, col: -1 },
        { row: 0, col: 1 }
      ];
      shuffleArray(directions);

      let newRow = currentRow;
      let newCol = currentCol;

      for (let i = 0; i < directions.length; i += 1) {
        const candidateRow = currentRow + directions[i].row;
        const candidateCol = currentCol + directions[i].col;
        if (candidateRow >= 0 && candidateRow < rows && candidateCol >= 0 && candidateCol < columns) {
          newRow = candidateRow;
          newCol = candidateCol;
          break;
        }
      }

      toucanLocation = newRow * columns + newCol;

      if (toucanLocation === playerPosition) {
        gameOver = true;
        const imgId = ids[playerPosition];
        const img = document.getElementById(imgId);
        if (img) {
          img.src = "images/Toucan.png";
          img.onclick = function () { };
        }
      }
    }

    initializeLocations();

    function updateStatus() {
      const locationsText = locationsVisited === 0
        ? "Number of locations checked is zero."
        : `Number of locations checked is ${locationsVisited}.`;
      document.getElementById("locations").textContent = locationsText;
      document.getElementById("score").textContent = `Score is ${score}.`;
    }

    function check(position) {
      if (gameOver) {
        return;
      }

      const imgId = ids[position];
      const img = document.getElementById(imgId);
      if (!img) {
        return;
      }

      let scored = false;
      let tileLabel = "tree";

      if (position === statueLocation) {
        img.src = "images/Gloden statue.png";
        img.onclick = function () { };
        score -= 3;
        gameOver = true;
        scored = true;
        tileLabel = "statue";
      } else if (position === toucanLocation) {
        img.src = "images/Toucan.png";
        img.onclick = function () { };
        score += 5;
        scored = true;
        tileLabel = "toucan";
      } else if (lorikeetLocations.includes(position)) {
        img.src = "images/lorikeet.png";
        img.onclick = function () { };
        score += 3;
        scored = true;
        tileLabel = "lorikeet";
      } else if (buntingLocations.includes(position)) {
        img.src = "images/bunting.png";
        img.onclick = function () { };
        score += 1;
        scored = true;
        tileLabel = "bunting";
      }

      if (!scored) {
        img.src = "images/Tree.png";
        tileLabel = "tree";
      }

      locationsVisited += 1;
      img.alt = `Checked location ${position}.`;
      img.title = `Checked location ${position}.`;
      img.dataset.text = `Checked location ${position} (${tileLabel}).`;
      updateStatus();
      lastLocation = position;

      if (!gameOver) {
        moveToucan(position);
      }
    }

    function help() {
      const row = Math.floor(lastLocation / columns);
      const col = lastLocation % columns;

      const left = col === 0 ? lastLocation + (columns - 1) : lastLocation - 1;
      const right = col === columns - 1 ? lastLocation - (columns - 1) : lastLocation + 1;
      const up = (lastLocation - columns + totalLocations) % totalLocations;
      const down = (lastLocation + columns) % totalLocations;
      const buntingNeighbors = [left, right, up, down];

      const helpValue = document.getElementById("help");

      if (buntingNeighbors.some((loc) => buntingLocations.includes(loc))) {
        helpValue.textContent = "cheep";
        return "cheep";
      }

      let toucanNearby = false;
      let statueNearby = false;

      for (let r = row - 1; r <= row + 1; r += 1) {
        if (r < 0 || r >= rows) {
          continue;
        }
        for (let c = col - 1; c <= col + 1; c += 1) {
          if (c < 0 || c >= columns) {
            continue;
          }
          const loc = r * columns + c;
          if (loc === toucanLocation) {
            toucanNearby = true;
          }
          if (loc === statueLocation) {
            statueNearby = true;
          }
        }
      }

      if (toucanNearby) {
        helpValue.textContent = "caw";
        return "caw";
      }

      if (statueNearby) {
        helpValue.textContent = "thrrum";
        return "thrrum";
      }

      helpValue.textContent = "silence";
      return "silence";
    }
  </script>
</body>
</html>
