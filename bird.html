<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puneeth Bird Hunt</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f7fb;
      color: #1f2937;
    }

    .page {
      max-width: 900px;
      margin: 30px auto;
      padding: 24px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      color: #0f172a;
    }

    .status {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px;
      margin-bottom: 20px;
    }

    .status p {
      margin: 0;
      padding: 10px 12px;
      border-left: 4px solid #2563eb;
      background: #eff6ff;
      border-radius: 6px;
    }

    .board {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }

    .location {
      aspect-ratio: 1 / 1;
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      overflow: hidden;
      background: #e2e8f0;
    }

    .location img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @media (max-width: 800px) {
      .row {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Puneeth Reddy Gaddam bird hunt</h1>

    <p>Click on the locations to find the birds, watch out for the forbidden statue</p>

    <div class="status">
      <p id="locations">Number of locations checked is zero.</p>
      <p id="score">Score is zero.</p>
      <p>Click for help.</p>
      <p id="help">Help report</p>
    </div>

    <div class="board">
      <div class="row">
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
      </div>

      <div class="row">
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
      </div>

      <div class="row">
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
      </div>

      <div class="row">
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
      </div>

      <div class="row">
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
        <div class="location"><img src="images/Tree.png" alt="bush or tree"></div>
      </div>
    </div>
  </main>
</body>
</html>
