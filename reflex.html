<!DOCTYPE html>
<html lang="en">
<head>
  <title>Puneeth Reddy Gaddam reflexes</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" 
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" 
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>  

  </head>
<body>

  <h2>Puneeth Reddy Gaddam reflexes</h2>

  <div class="mb-3" id="target">Your time</div>
  <div class="mb-3" id="countdown">Count</div>

  <button type="button" class="btn btn-primary me-2" id="goButton">Go</button>
  <button type="button" class="btn btn-danger" id="haltButton">Halt</button>

  <script>
    let haltTime;

    function recordTime() {
      haltTime = Date.now();
      console.log(haltTime);
    }

    function beginTime() {
      for (let i = 0; i < 6; i += 1) {
        setTimeout(() => {
          document.getElementById("countdown").innerHTML = i;
        }, (5 - i) * 1000);
      }

      setTimeout(() => {
        if (haltTime === undefined) {
          document.getElementById("target").innerHTML = "Not soon enough";
        } else {
          const targetTime = Date.now();
          const elapsed = targetTime - haltTime;
          document.getElementById("target").innerHTML = `Time was ${elapsed}`;
        }
      }, 5000);
    }

    document.getElementById("haltButton").onclick = recordTime;
    document.getElementById("goButton").onclick = beginTime;
  </script>

</body>
</html>
